# APP NAME
spring.application.name=user-service

# PORT (RAILWAY)
server.port=${PORT:8080}

# =========================
# EUREKA (CRITICAL)
# =========================
eureka.client.service-url.defaultZone=https://quantitymeasurementappdeploy-production.up.railway.app/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# =========================
# INSTANCE CONFIG (FINAL FIX)
# =========================
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=quantitymeasurementuser-services-production.up.railway.app
eureka.instance.instance-id=${spring.application.name}:${random.value}

# =========================
# DATABASE (H2)
# =========================
spring.datasource.url=jdbc:h2:mem:userdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# =========================
# JPA
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
