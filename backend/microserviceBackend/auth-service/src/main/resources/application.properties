# APP NAME
spring.application.name=auth-service

# PORT (IMPORTANT FOR RAILWAY)
server.port=${PORT:8080}

# =========================
# DATABASE CONFIG (H2)
# =========================
spring.datasource.url=jdbc:h2:mem:authdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# =========================
# JPA CONFIG
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# H2 CONSOLE (OPTIONAL)
# =========================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =========================
# EUREKA CONFIG (CRITICAL)
# =========================
eureka.client.service-url.defaultZone=https://quantitymeasurementappdeploy-production.up.railway.app/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# =========================
# INSTANCE CONFIG (FIXED)
# =========================
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${HOSTNAME}
eureka.instance.instance-id=${spring.application.name}:${random.value}

# =========================
# ACTUATOR
# =========================
management.endpoints.web.exposure.include=*

# =========================
# GOOGLE AUTH
# =========================
google.oauth.client-id=your-google-client-id
