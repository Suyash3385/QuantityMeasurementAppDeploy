spring.application.name=api-gateway
server.port=8080

# CORS Configuration is now handled by CorsConfig class (CorsFilter Bean)

# Actuator Configuration for Health Checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Eureka Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Gateway Routes (MVC)
# AUTH SERVICE
spring.cloud.gateway.mvc.routes[0].id=auth-service
spring.cloud.gateway.mvc.routes[0].uri=lb://auth-service
spring.cloud.gateway.mvc.routes[0].predicates[0].name=Path
spring.cloud.gateway.mvc.routes[0].predicates[0].args.pattern=/auth/**

# USER SERVICE
spring.cloud.gateway.mvc.routes[1].id=user-service
spring.cloud.gateway.mvc.routes[1].uri=lb://user-service
spring.cloud.gateway.mvc.routes[1].predicates[0].name=Path
spring.cloud.gateway.mvc.routes[1].predicates[0].args.pattern=/users/**

# MEASUREMENT SERVICE
spring.cloud.gateway.mvc.routes[2].id=measurement-service
spring.cloud.gateway.mvc.routes[2].uri=lb://measurement-service
spring.cloud.gateway.mvc.routes[2].predicates[0].name=Path
spring.cloud.gateway.mvc.routes[2].predicates[0].args.pattern=/measurement/**