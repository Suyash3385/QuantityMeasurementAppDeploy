spring.application.name=api-gateway
server.port=${PORT:8080}

# =========================
# ACTUATOR
# =========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =========================
# EUREKA (OPTIONAL)
# =========================
eureka.client.service-url.defaultZone=https://quantitymeasurementappdeploy-production.up.railway.app/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# =========================
# GATEWAY ROUTES (FINAL FIX)
# =========================

# AUTH SERVICE
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=https://quantitymeasurementauthservices-production.up.railway.app
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# USER SERVICE
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=https://quantitymeasurementuser-services-production.up.railway.app
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# MEASUREMENT SERVICE
spring.cloud.gateway.routes[2].id=measurement-service
spring.cloud.gateway.routes[2].uri=https://quantitymeasurementappdeploy.onrender.com
spring.cloud.gateway.routes[2].predicates[0]=Path=/measurement/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1
