spring.application.name=api-gateway
server.port=${PORT:8080}

# =========================
# ACTUATOR
# =========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =========================
# EUREKA (OPTIONAL NOW)
# =========================
eureka.client.service-url.defaultZone=https://quantitymeasurementappdeploy-production.up.railway.app/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# =========================
# GATEWAY ROUTES (FIXED)
# =========================

# AUTH SERVICE
spring.cloud.gateway.mvc.routes[0].id=auth-service
spring.cloud.gateway.mvc.routes[0].uri=https://quantitymeasurementauthservices-production.up.railway.app
spring.cloud.gateway.mvc.routes[0].predicates[0].name=Path
spring.cloud.gateway.mvc.routes[0].predicates[0].args.pattern=/auth/**
spring.cloud.gateway.mvc.routes[0].filters[0].name=StripPrefix
spring.cloud.gateway.mvc.routes[0].filters[0].args.parts=1

# USER SERVICE
spring.cloud.gateway.mvc.routes[1].id=user-service
spring.cloud.gateway.mvc.routes[1].uri=https://quantitymeasurementuser-services-production.up.railway.app
spring.cloud.gateway.mvc.routes[1].predicates[0].name=Path
spring.cloud.gateway.mvc.routes[1].predicates[0].args.pattern=/users/**
spring.cloud.gateway.mvc.routes[1].filters[0].name=StripPrefix
spring.cloud.gateway.mvc.routes[1].filters[0].args.parts=1

# MEASUREMENT SERVICE
spring.cloud.gateway.mvc.routes[2].id=measurement-service
spring.cloud.gateway.mvc.routes[2].uri=https://quantitymeasurementappdeploy.onrender.com
spring.cloud.gateway.mvc.routes[2].predicates[0].name=Path
spring.cloud.gateway.mvc.routes[2].predicates[0].args.pattern=/measurement/**
spring.cloud.gateway.mvc.routes[2].filters[0].name=StripPrefix
spring.cloud.gateway.mvc.routes[2].filters[0].args.parts=1
